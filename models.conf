# Agent → model mapping. This is the user-facing knob.
# Edit this, then run ./set-models.sh to apply, then ./install.sh.
#
# Format: one "agent-name  model-id" per line. Blank lines and lines
# starting with # are ignored. The separator is whitespace and/or a
# single "=", e.g. both of these are valid:
#     local-architect            claude-opus-4.8
#     local-architect = claude-opus-4.8
#
# The model IDs here are the user-editable source: ./set-models.sh writes your
# choices into the agent frontmatter and the playbook table, and
# ./set-models.sh --check then verifies those two machine-readable locations
# agree (CI runs this).

local-architect            claude-opus-4.8
local-developer            claude-opus-4.8
local-deep-reviewer        claude-opus-4.8
local-code-reviewer        gpt-5.3-codex
local-critical-reviewer    gpt-5.5
local-tech-writer          gpt-5.5
local-integration-reviewer gemini-3.1-pro-preview
local-readability-reviewer claude-sonnet-4.6
local-qa-tester            claude-sonnet-4.6
